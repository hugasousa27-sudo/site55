<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atelier Luxury Store</title>
  <link rel="stylesheet" href="ccs/style.css" />
</head>
<body>

  <header>
    <div class="container nav">
      <h1>ATELIER</h1>

      <nav>
        <a href="#shop">Shop</a>
        <a href="#about">About</a>
        <a href="#journal">Journal</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <p>MODERN LUXURY ESSENTIALS</p>
      <h2>Elevated Everyday</h2>
      <span>
        Premium ecommerce experience inspired by modern editorial brands.
      </span>

      <button>Explore Collection</button>
    </div>
  </section>

  <section id="shop" class="products container">

    <div class="product-card" data-product-id="aura-serum" data-product-name="Aura Serum" data-product-price="€48" data-product-img="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=1200&auto=format&fit=crop">
      <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=1200&auto=format&fit=crop" />

      <div class="product-info">
        <div>
          <h3>Aura Serum</h3>
          <p>€48</p>
        </div>

        <button class="open-product">Add</button>
      </div>
    </div>

    <div class="product-card" data-product-id="velvet-cream" data-product-name="Velvet Cream" data-product-price="€62" data-product-img="https://images.unsplash.com/photo-1515377905703-c4788e51af15?q=80&w=1200&auto=format&fit=crop">
      <img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?q=80&w=1200&auto=format&fit=crop" />

      <div class="product-info">
        <div>
          <h3>Velvet Cream</h3>
          <p>€62</p>
        </div>

        <button class="open-product">Add</button>
      </div>
    </div>

    <div class="product-card" data-product-id="noir-essence" data-product-name="Noir Essence" data-product-price="€89" data-product-img="https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=1200&auto=format&fit=crop">
      <img src="https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=1200&auto=format&fit=crop" />

      <div class="product-info">
        <div>
          <h3>Noir Essence</h3>
          <p>€89</p>
        </div>

        <button class="open-product">Add</button>
      </div>
    </div>

  </section>

  <section id="about" class="about container">
      </section>

  <section id="journal" class="journal container">
      </section>

  <section id="contact" class="newsletter">
      </section>

  <footer>
    © 2026 Atelier — Luxury Ecommerce Experience.
  </footer>

  <div id="product-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content container">
      <button class="close-modal">&times;</button>
      <div class="modal-body">
        <img id="modal-product-img" src="" alt="Produto">
        <div class="modal-details">
          <h2 id="modal-product-name"></h2>
          <p id="modal-product-price"></p>
          <div class="modal-actions">
            <button id="modal-add-to-cart">Adicionar ao Carrinho</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
